body:
  text: 二皇甫集巻七唐皇甫冉撰七言絶句臨平道中贈同舟人逺山誰辨江南北長路空隨樹淺深流蕩飄颻此何極唯因行客共知心舟中送李八得迴字詞客金門未有媒遊吳適越任舟迴逺水迢迢分首去天邉山色待人来少室韋錬師昇仙歌紅霞紫氣晝氲氲絳節青幢迎少君忽從林下昇天去空使時人禮白雲送裴闡得歸字道向毗陵豈是歸客中誰與換春衣今夜孤舟行近逺子荆零雨正霏霏秋夜戱題劉方平壁鴻悲月白時將謝正可招尋惜遥夜翠帳蘭房曲且深寜知户外清霜下重陽日酬李觀不見白衣來送酒但令黄菊自開花愁看日晩良辰過歩歩行尋陶令家寄權器露濕青無時欲晩水流黄葉意無窮節近重陽念歸否眼前籬菊帶秋風送陸澧郭鄖纔見吳洲百草春已聞燕鴈一聲新秋風何處催年急偏逐山行水宿人寄振上人無礙寺所居戀親時見在人羣多在東南就白雲獨坐焚香誦經處深山古寺雪紛紛酬張繼并序懿孫余之舊好祗役武昌六言詩見懐今以七言裁答盖拙於事者繁而費也悵望南徐登北固迢遥西塞限東關落日臨川問音信寒潮惟帶夕陽還又得雲字何事千年遇聖君坐令雙鬢老如雲南行更入深山淺岐路悠悠水自分題蔣道士房軒窻縹緲起煙霞誦訣存思白日斜聞道崑崙有仙籍何時青鳥送丹砂送雲陽少府得歸字渭曲春光無逺近池陽谷口倍芳菲官舎村橋來幾日殘花寥落待君歸曽山送别凄凄遊子若飄蓬明月清罇秪暫同南望千山如黛色愁君客路在其中赴李少府莊失路君家南郭白雲連正待情人弄石泉月照煙花迷客路蒼蒼何處是伊川送謝十二判官四牡驅馳千里餘越山稠疊海林踈不辭終日離家逺應為劉公一紙書同李萬晩望南岳寺懐普門上人釋子身心無垢紛獨將衣鉢去人羣相思晩望松林寺唯有鐘聲出白雲送魏十六還蘇州秋夜沉沉北一作此送君隂蟲切切不堪聞歸一作孤舟明月一作日毘陵道迴首姑蘇是白雲浪淘沙二首蠻歌荳蔲北人愁松雨蒲風野艇秋浪起鵁鶄眠不得寒沙細細入江流灘頭細草接踈林惡浪罾船半欲沉宿鷺眠洲非舊浦去年沙觜是江心夜發沅江寄李潁州劉侍郎時二公貶於此半夜回舟入楚鄉月明山水共蒼蒼孤猿更發秋風裏不是愁人亦斷腸二皇甫集巻七
