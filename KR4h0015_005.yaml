body:
  text: 二皇甫集巻五唐皇甫冉撰七言律詩三月三日義興李明府後亭泛舟江南煙景復如何聞道新亭更可過處處萟蘭春浦緑萋萋藉草逺山多壺觴湏就陶彭澤時俗猶傳晉永和更使輕橈徐轉去㣲風落日水増波送李録事赴饒州北人南去雪紛紛鴈呌汀沙不可聞積水長天隨逺客荒城極浦足寒雲山從建業千峰斷江至潯陽九𣲖分借問督郵纔弱冠府中年少不如君秋夜有懷髙十五兼呈空和尚晩節聞君趨道深結茅栽樹近東林大師幾度曽摩頂髙士何年遂發心北渚三更聞過鴈西城萬里動寒砧不見支公與𤣥度相思擁膝坐長吟𤣥元觀送李深李風還奉先華隂此去那知道路遥寒原紫府上迢迢莫持别酒傾瓊液乍唱離歌和鳯簫逺水東流浮落景繚垣西轉失行鑣華山秦塞長相憶無使音塵頓寂寥送錢塘路少府赴制舉公車待詔赴長安客裏新正阻舊歡遲日未能銷野雪晴花偏自犯江寒東溟道路通秦塞北闕威儀識漢官共許郄詵工射䇿恩榮請向一枝看酬張二倉曹揚子所居見寄兼呈韓郎中孤雲獨鶴自悠悠别後經年尚泊舟漁父置詞相借問郎官能賦許依投折芳逺寄三春草乗興閒看萬里流莫怪杜門頻乞假不堪扶病拜龍樓使往壽州淮路寄劉長卿榛草荒凉村落空驅馳卒歳亦何功蒹葭曙色蒼蒼逺蟋蟀秋聲處處同鄉路遥知淮浦外故人多在楚雲東日夕煙霜那可道壽陽西去水無窮同温丹徒登萬歳樓髙樓獨立一作上思依依極浦遥山合翠㣲江客不堪頻北顧塞鴻何事復南飛丹陽古渡寒煙積𤓰歩空州逺樹稀聞道王師猶轉戰誰能談笑觧重圍宿淮隂南樓酬常伯能淮隂日落上南樓喬木荒城古渡頭浦外野風初入户窗中海月早知秋滄波一望知千里畫角三聲起百憂佇一作獨立分宵絶一作逺来客煩君歩履忽相求酬李補闕十年歸客但心傷三徑無人已自荒夕宿靈臺伴煙月晨趨建禮逐衣裳偶因麋鹿隨豐草謬荷鴛鸞借末行縱有諌書猶未獻春風拂地日空長送崔使君赴壽州一見劉長卿集列郡專城分國憂彤䄡皂盖古諸侯仲華遇主年猶少公瑾論兵位已酬草色青青宜建隼蟬聲處處雜鳴騶千里相思如可見淮南木落早驚秋館陶李丞舊居盛名天下挹餘芳棄置終身不拜郎詞藻世傳平子賦園林人比鄭公郷門前墜葉浮秋水籬外寒臯帶夕陽日月青松成古木秪應来者為心傷送袁郎中破賊北歸優詔親賢時獨稀中途紫綬換征衣黄香省闥登朝去楊僕樓船振旅歸萬里長聞隨戰角十年不得偃郊扉闕但将詞賦奉恩輝寄韋司直郎士元亦有此詩未詳誰作聞君感歎二毛初舊友相邀萬里餘烽戍有時驚暫定甲兵何處可安居客来吳地星霜久家在平陵音信踈昨夜春風還入户登山臨水復何如彭祖井上公旌節在徐方舊井莓苔近寢堂訪古應知彭祖宅得仙何必葛洪鄉清虚不共春池競盥潄偏宜夏日長聞道延年如玉液欲將調鼎獻明光秋日東郊作閒看秋水心無事卧對寒林一作松手自栽廬岳髙僧留偈别茅山道士寄書來燕知社日辭巢去菊為重陽冐雨開淺薄將何稱獻納臨岐終日自遲迴送張道士歸茅山謁李尊師向山獨有一人行近洞應逢雙鶴迎常以素書傳子弟還因白石號先生無窮杏樹行時種幾許芝田向月耕師事少君年嵗久欲隨旌節徃層城送孔巢父赴河南軍江城相送阻煙波况復新秋一鴈過聞道全師征北虜更言諸將㑹南河邉心杳杳郷人絶塞草青青戰馬多共許陳琳工奏記知君名宦未蹉跎招隠寺送閻判官還江州離别那逢秋氣悲東林更作上方期共知客路浮雲外暫愛僧房墜葉時長江九派人歸少寒嶺千重鴈度遲借問潯陽在何處每看潮落一相思李二侍御丹陽東去新亭姑蘇東望海陵間幾度裁書信未還長在府中持白簡豈知天畔有青山人歸極浦寒流廣鴈下平蕪秋野閒舊日新亭更携手他郷風景亦相關二皇甫集巻五
