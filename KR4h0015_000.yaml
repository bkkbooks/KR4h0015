body:
  text: 二皇甫集總集類提要臣等謹案唐皇甫冉皇甫曾合集共八卷冉字茂政丹陽人天寶十五載進士大厯中官至左補闕曾字孝常天寶十二載進士官至監察御史謫陽翟令以終曽集一卷與書録解題合冉集七卷較書録解題多五卷然曾集前有大厯十年獨孤及序稱三百有五十篇而此本僅二百三十四篇則已佚其一百十六篇又酬楊侍御寺中見招送薛判官之越送魏中丞還河北賦得越山皆三韻律詩而編五言古詩中奉寄皇甫補闕六言一首乃張繼詩冉有答詩並序可證而亦編為冉詩知舊本附答詩後重刋者分體編次乃雜入六言詩中遂誤為冉詩則并次第亦非其舊觀其與曾集皆以五言排律别立一體非惟唐無此名即宋元亦尚無此名其為髙柄以後不學者所竄亂審矣前有王廷相序後有楊慎跋並稱河中劉潤之輯二皇甫集然則此集即潤之所編也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀二皇甫集序五言詩之源生於國風廣於離騷著於蘇李盛於曹劉其所自逺矣當漢魏間雖已朴散為器作者猶質有餘而文不足以今揆昔則有朱絃疏越大羮遺味之嘆歷千餘嵗至沈詹事宋員外始財成六吕彰施五色使言之而中倫歌之而成聲緣情綺靡之功至是乃備雖去雅寢逺其麗有過於古者亦猶路鼗出於土鼓篆籀生於鳥迹也沈宋既殁而崔司勳皓王右丞維復崛起於開元天寶之間得其門而入者當代不過數人補闕其一也補闕諱冉字茂政玄晏先生之後樂平縣令價之孫潭州長史顗之子十嵗能屬文十五而老成右丞相曲江張公深所嘆異伯父祕書少監彬尤器之自而令問修暢舉進士第一歷無錫尉左金吾兵曹今相國太原公之推轂河南也辟為書記大厯二載遷左拾遺轉左補闕奉使江表因省家至丹陽朝廷虛三署郎位以待君之復不幸短命年方五十四而殁嗚呼惜哉君忠恕亷恪居官可紀孝友恭讓自內形外言必依仁交不苟合得喪喜愠罕見於容故覩君述作知君所尚以景命不永斯文未臻其極也蓋存於遺禮者凡三百有十五篇其詩大略以古之比興就今之聲律涵泳風騷憲章顔謝至若麗曲感動逸思奔發則天機獨得非師資所漿每舞雩詠歸或金谷文會曲水修禊南浦愴别新聲秀句輒加於常時一等才鍾於情故也君母弟曽字孝常與君同稟學詩之訓君有誨誘之助焉既而麗藻競爽盛名相亞同乎聲者方之景陽孟陽孝常既除喪懼遺製之墜於地也以某與茂政前後為諫官故銜痛編集以論撰見託遂著其始終以冠於篇時大厯十四年月日司封郎中河南獨孤及序二皇甫集序唐大厯中以詩名者有錢起盧綸李端吉中孚韓栩司空曙苗發崔洞耿湋夏侯審十人當時以才子目之後世之論恆不釋於斯較唐一代著作神龍垂拱撲而實開元天寶淳而暢及大厯則美麗矣物至於麗削薄以之而才之稱反不出於盛唐諸君子之際何耶蓋聲獲於偶然而標榜起於所尚古今之通途也功相亞則以功並顯德相侔則以德並著志相符則以志並傳文相擬則以文並美故三傑二疏七賢七子之見稱於時固然矣今觀十子之詩其氣骨類遞相倣效者雖間有才質縮舒而其機軸如發於一遽不得以參差論也然則名稱標榜之來謂不自兹乎雖然劉長卿二皇甫亦為同時其才格當不在十子之下而不得與其列何哉蓋招搖之光屬於斗外濟水泓然以瀆並名故曰聲稱獲於偶然殊不足為定論也同寅劉君潤之工於唐人之作政暇取大厯十子詩校正命梓以傳後取皇甫諸君之詩續之鳴呼君之意可以識矣儀封王廷相子衡序
