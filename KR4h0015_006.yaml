body:
  text: 二皇甫集卷六唐皇甫冉撰五言絶句同諸公有懷舊國迷江樹他鄉近海門移家南渡久童稚解方言題畫帳二首山水桂水饒楓杉荆南足煙雨猶凝黛色中復是雒陽岨逺帆朝見巴山客暮見巴山客雲帆倘暫停中路陽臺夕渡汝水向太和山落日事褰涉西南投一峰誠知秋水淺但怯無人蹤秋怨長信多秋氣昭陽借月華那堪閉永巷聞道選良家山中五詠門栁接影武昌城分行漢南道何事閉門外空對青山老逺山少室盡西峰鳴臯隱南靣柴門縱復關終日窗中見南澗上路各乘軒髙朋盡鳴玉寧知澗下人自愛輕波渌春草草遍潁陽山花開武陵水春色既已同人心亦相似山館山館長寂寂間雲朝夕來空庭復何有落日照青苔同張侍御詠興寧寺經藏院海石榴嫩葉生初茂殘花少更鮮結根龍藏側故欲抗青蓮送王司直西塞雲山遠東風道路長人心勝潮水相送過潯陽婕妤怨花枝出建章鳯管發朝陽借問承恩者雙蛾幾許長酬李判官度梨嶺見寄隴首怨西征嶺南鴈北顧行人與流水共向閩中去題盧十所居春風來幾日先入辟疆園身外無餘事間吟晝閉門山半橫雲湘水風日滿楚山朝夕空連峰雖已見猶念長雲中病中對石竹花散點空階下間凝細雨中那能久相伴嗟爾殢秋風送王翁信還剡中舊居海岸耕殘雪溪沙釣夕陽家中何所有春草漸看長送陸邃潛夫并序頃者江淮征鎮屢有掄材之舉子不列焉有司之過豫方耕山釣湖避人如逃寇徒欲羅髙鴻捕深魚窮年竭日其可得也今齒髮向暮執勞無力衆雛嗷嗷開口待哺如有知者子其行乎無為自苦一絶賦之髙山逈欲登逺水深難渡杳杳復漫漫行人别家去楊氏林亭探得古槎千年古貌多八月秋濤晚偶被主人留那知來近遠和王給事禁省梨花詠巧解逢人笑還能亂蝶飛春時風入户幾片落朝衣送陸鴻漸赴越并序君自數百里訪豫羇病牽力迎門握手心喜冝涉旬日始至焉究孔釋之名理窮歌詩之麗則逺墅孤島通舟必行漁梁釣磯隨意而往餘興未盡告云遐征夫越地稱山水之鄉轅門當節鉞之重進可以自薦求試退可以間居保和吾子所行蓋不在此尚書郎鮑侯知子愛子者將推食解衣以拯其極講德遊藝以凌其深豈徒嘗鏡水之魚宿耶溪之月而已吾是以無間勸其晨裝同賦送逺客一絶行隨新樹深夢隔重江遠迢遞風日間滄茫洲渚晚臺頭寺願上人院古松下有小松栽毫未新生與纎草不辨重其有凌雲干霄之志與趙八員外裴十補闕同賦之細草亦全髙秋毫乍堪比及至干霄日何人復居此漁子溝寄趙員外裴補闕欲逐淮潮上暫停漁子溝相望知不見終是屢回頭同李三月夜作霜風驚度鴈月露皎踈林處處砧聲發星河秋夜深初出沅江夜入湖放溜出江口回瞻松栝深不知舟中月更引湖間心送裴陟歸常州夜雨須停棹秋風暗入衣見君常北望何事却南歸洪澤館壁見故禮部尚書題詩底事洪澤壁空留黃絹詞年年淮水上行客不勝悲望南山雪懷山寺普上人夜夜夢蓮宫無由見逺公朝來出門望知在雪山中贈寄權二客舍南橋春日暮楊柳帶清渠不得同携手空成意有餘送李山人還從來無檢束只欲老煙霞雞犬聲相應深山有幾家六言附小江靈一上人江上年年春早津頭日日人行借問山隂逺近猶聞薄暮鐘聲間居又作王維詩桃紅復含宿雨柳緑更帶春煙花落家童未掃鶯啼山客猶眠送鄭二之茅山水流絶澗終日草長深山暮春犬吠雞鳴幾處條桑種杏何人問李二司直所居雲山門外水流何處天邉樹繞誰家山色東西多少朝朝幾度雲遮二皇甫集卷六
