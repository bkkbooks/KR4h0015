body:
  text: 二皇甫集巻一唐皇甫冉撰四言古詩劉方平璧畫山墨妙無前性生壁先廻溪已失逺嶂猶連側徑樵客長林野煙青峯之外何處雲天五言古詩與張補闕王錬師自徐方清路同舟南下於臺頭寺留别趙員外裴補闕同賦雜題一首朝朝春事晩泛泛行舟逺淮海思無窮悠揚煙景中幸将仙子去復與故人同髙枕隨流水輕㠶任逺風鐘聲野寺逈草色故城空送别髙臺上徘徊共惆悵懸知白日斜定是猶相望屏風上各賦一物得携琴客不是向空林應當就磐石白雲知隠處芳草迷行迹如何祗役心見爾携琴客寄劉方平坐憶山中人窮棲事南畆煙霞相親外墟落今何有潘郎作賦年陶令辭官後逹生貴自適良願固無負田取潁水流樹入陽城口歳暮憂思盈離居不堪久曽東遊以詩寄之出郭誰言多廻車始知逺寂然層城暮更念前山轉緫轡越成臯浮舟背梁苑朝朝勞延首徃徃若在眼落日孤雲還邉愁迷楚關如何椒花發復對遊子顔古寺杉松裏連檣洲渚間煙生海西岸雲見吳南山驚風掃蘆荻翻浪連天白正是揚㠶時偏逢江上客由來論佳句况乃惬所適嵳峩天姥峯翠色春更碧氣棲湖上雨月净剡中夕釣艇或相逢江蘺又堪摘迢迢始寧野蕪沒謝公宅朱槿摧列墉蒼苔徧幽石顧予任踈懶期爾振羽翮滄洲未可行湏售金門䇿崔十四宅各賦一物得簷栁官渡老風煙潯陽媚雲日漢將營前見胡笳曲中出復在此簷端重隂仲長室送段明府遥夜此何其霜空殘杳靄方嗟異鄉别蹔是同公㑹海林秋更踈野水寒猶大離人轉吳岫旅鴈從燕塞日夕望前期勞心白雲外酬楊侍御寺中見招貧居依栁市閒歩在蓮宫髙閤宜春雨長廊好嘯風誠如雙樹下豈比一丘中見諸姬學玉臺體艶唱召燕姬清絃侍盧女由來道姓秦誰不知家楚傳杯見目成結帶明心許寜辭玉輦迎自堪金屋貯朝朝作行雲襄王迷處所題裴二十一新園東郭訪先生西郊尋隠路久為江南客自有雲陽樹已得閒園心不知公府步開門白日晩倚杖青山暮果熟任霜封籬踈從水度窮年常牽綴徃事皆淪悞唯見耦耕人朝朝自來去寄髙雲南徐風日好悵望毗陵道毗陵有故人一見恨無因獨戀青山久唯令白髪新每嫌持手板時見著頭巾煙景臨寒食農桑接仲春家貧仍嗜酒生事今何有芳草遍江南勞心憶携手送張南史效何記室體馬卿工詞賦位下年將暮謝客愛雲山家貧身不閒風波杳未極幾處逢相識富貴人皆變誰能念貧賤岸有經霜草林有故年枝俱應待春色獨使客心悲送薛判官之越時難自多務識小亦求賢道路無辭逺雲山併在前樟亭待潮處已是越人煙賦得簷燕拂水競何忙傍簷如有意翻風去每逺帶雨歸偏駛今君裁杏梁更欲年年去送魏中丞還河北寧知貴公子本是魯諸生上國風塵舊中司印綬榮辛勤戎旅事雪下䕶羌營又賦得越山三韻西陵猶隔水北岸已春山獨鳥連天去孤雲伴客還祗應結茅宇出入石林間送竇叔向楚客怨逢秋閒吟興非一棄官守貧病作賦推文律樵徑未沾霜茅簷初負日今看泛月去偶見乗潮出卜地㑹為鄰還依仲長室題髙雲客舍孤興日自深浮雲非所仰窻中西城峻樹外東川廣晏起簮葛巾閒吟倚藜杖阮公道在醉莊子生常養五柳轉扶踈千峰恣來徃清秋香秔穫白露寒菜長吳國滯風煙平陵延夢想時人趨纓弁髙鳥違羅網世事徒亂紛吾心方浩蕩唯將山與水處處諧真賞之京留别劉方平客子慕儔侣含悽整晨装邀歡日不足况乃前期長離袂惜嘉月逺還勞折芳遲迴越二陵迴首但蒼茫喬木清宿雨故關愁夕陽人言長安樂其奈緬相望出塞吹角出塞門前瞻即胡地三軍盡回首皆洒望鄉淚轉念關山長行看風景異由來征戍客負得輕生義酬裴十四得宴字淮海各聨翩三年方一見素心終不易𤣥髪何湏變舊國想平陵春山滿陽羡鄰鷄莫遽唱共惜良夜宴送鄭二貟外置酒竟長宵送君登逺道羈心看旅鴈晩泊依秋草秋草尚芊芊離憂亦𣺌然元戎辟才彦行子犯風煙風煙積惆悵淮海殊飄蕩明日是重陽登髙逺相望二皇甫集巻一
