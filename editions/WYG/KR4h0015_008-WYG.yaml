body:
  text: 二皇甫集巻八唐皇甫曽撰五言古詩贈霈禪師南嶽滿湘源吾師經利渉身歸沃洲老名與支公接浄教傳荆吳道縁止漁獵觀空色不染對境心自愜室中人寂寞門外山稠疊天台積幽夣早晩當負笈五言律詩奉陪韋中丞使君遊鶴林寺古寺傳燈久層城閉閣閒香花同法侣旌斾入深山寒磬空虛裏孤雲起㓕間謝公慞一作憶髙卧徒御欲忘一作東還奉送杜侍御還罷戰回龍節朝天識鳯池寒生五湖道春及萬年枝召化一作郡多遺愛胡清一作官已畏知懷恩偏感别墮淚向旌麾酬鄭侍御秋夜見寄摇落空林夜河陽興已生未一作欲辭公府步知結逺山情髙柳風難定寒泉月助明袁公方卧雪尺素及柴荆送普上人還陽羡一作皇甫冉花宫難久别道者憶千燈殘雪入林路暮山歸寺僧日光依嫩草泉響滴春氷何用求方便看心是一乗送李中丞歸本道上將宜分閫雙旌復去一作出秦關河三晉路賔從五原人碣石山通海滹沱雪度春一作孤戍雲連海平沙雪度春酬恩看玉劍何處有煙塵和謝舍人雪夜寓直禁省夜沉沉春風雪滿林滄洲歸客夣青𤨏近臣心揮翰宣鳴玉承恩在錫金建章寒漏起更助掖垣深傷陸處士從此無期見柴門對雪開二毛逢世難萬恨掩泉臺返照空堂夕孤城弔容迴漢家偏訪道猶畏鶴書來烏程水樓留别悠悠千里去惜此一尊同客散髙樓上㠶飛細雨中川程隨逺水楚思望青楓共說前期易滄波處處通西陵寄二公又見冉集題與尾句不同西陵遇風處一作雨自古是通津終日空江上雲山若待人汀洲寒事早魚鳥興情新西望稽山路吾心有所親題贈吳門邕上人春山唯一作臨一室獨坐草萋萋身寂心成道花閒一作開鳥自啼細東松徑裏返景竹林西晩與門人别依依出虎谿送著公歸越誰能愁此别到越㑹相逢長憶雲門寺門前千萬峯石床埋積雪山路倒枯松莫學白居士無人知去蹤送陸鴻漸山人採茶迴千峯待逋客香茗復叢生採摘知深處烟霞羡獨行幽期山寸逺野飯石泉清寂寂然燈夜相思磬一聲寄劉員外長卿南憶新安郡千山帶夕陽斷猿知夜久秋草助江長踈髪應成素青松獨耐霜愛才稱漢主題桂待回郷寄張衆甫悲風還一作生舊浦雲嶺隔東田伏臘同雞黍柴門閉雪天孤村明夜火稚子候歸船静者心相憶離居畏度年送元侍御充使湖南雲夣南行盡三湘萬里流山川重分首徒御亦悲秋白簡勞王事青猿助客愁離羣復多病嵗晩憶滄洲晩至華隂臘盡促歸心行人及華隂雲霞仙掌出松栢古祠深野渡氷生岸寒川燒隔林温泉看漸近宫樹晩沉沉送孔徴士谷口山一作雲多處君歸不可尋家貧清史在身老白雲深掃雪開松徑䟽泉過竹林余生負丘壑相送亦何心秋興流螢與落葉秋晩共紛紛返照城中盡寒砧雨外聞離人見衰鬢獨鶴慕同羣生容在千里相思看碧雲送歸中丞使新羅南憲銜恩去東夷泛海行天遥辭上國水盡到孤城已變炎凉氣仍愁浩淼程雲濤不可極來徃見雙旌送少㣲上人東南遊石梁人不到獨徃更迢迢乞食山家少尋鐘野寺遥松門風自掃瀑布雪難消秋夜聞清梵餘音逐海潮送韋判官赴閩中孤棹閩中客雙旌海上軍路人從北少嶺水向南分野鶴傷情别林猿忌夜聞漢家崇亞相知子遠邀勲送人徃荆州草色隨騘馬悠悠同出秦水傳雲夣曉山接洞庭春㠶影連三峽猿聲近四鄰青門一分手難見杜陵人寄净虛上人初至雲門寒蹤白雪裏法侣自提携竹徑通城下松門隔水西方同沃州去不似武陵迷髣髴心知處髙峯是㑹稽尋劉處士幾年人不見林下掩柴關留客當清夜逢君話舊山隔城寒杵急帶月早鴻還南陌雖相近其如隠者閒遇劉員外長卿别墅謝客開山後郊扉積水通江湖千里别衰老一樽同返照寒川滿平田暮雪空滄洲自有趣不復哭途窮五言排律春和杜相公移入長興宅奉呈諸宰執欲向幽偏適還從絶地移秦官鼎食貴堯世土階卑㦸户槐隂滿書牕竹葉垂纔分午夜漏遥隔萬年枝北闕深恩在東林逺夣知日斜門掩映山逺樹參差論道齊鴛一作鸞翼題詩憶鳯池從公亦何幸長與珮聲隨贈鑒上人律儀傳教誘僧臘老烟霄樹色依禪誦泉聲入寂寥寳龕經末刼畫壁見南朝深竹風開合寒潭月動摇息心歸静理愛道坐中宵更欲尋真去乗船泝海潮送湯中丞和蕃繼好中司出天心外國知已傳堯雨露更說漢威儀隴上應回首河源復載馳孤峯問徒御空磧見旌麾春草鄉愁起邉城旅夣移莫嗟行地逺此去荅恩私送和西蕃使白簡初分命黄金已在腰恩華通外國徒御發中朝雨雪從邉起旌旗上隴遥暮天沙漠漠空礫馬蕭蕭寒路隨河水關城見柳條和戎先罷戰知勝霍嫖姚送王相公赴幽州台衮兼戎律勤憂秉化元鳯池東掖寵龍節北方尊長路山河轉前驅鼔角喧人安布時令地逺荅君恩暮日平沙淡秋風大斾翻漁陽在天末戀别信陵門送徐大夫赴南海舊國當分閫天涯荅聖私大軍傳羽檄老將拜旌旗位重登壇後恩深挂印時何年諌獵賦今日飲泉詩海内求民瘼城隅見島夷由來黄覇去自有上台期七言律詩早朝日寄所知一作皇甫冉長安雪後見歸鴻紫禁朝天拜舞同曙色漸分雙闕下漏聲遥在百花中爐烟乍起開仙仗玉佩成行引上公共荷發生同雨露不應黄葉久從風秋夕寄懷契上人已見槿花朝委露獨悲孤鶴在人羣真僧出世心無事静夜名香手自焚窻臨絶澗同流水客至孤峯掃白雲更想清晨誦經處獨看松上雪紛紛張芬見訪郊居作林中雨散早涼生已有迎秋促織聲三徑荒蕪羞對客十年衰老愧稱兄愁心自惜江蘺晩一作短世事方㸔木槿榮君若罷官携手去尋山莫計白雲程奉寄中書王舎人腰金載筆謁承明至道安禪得此生西掖幾年綸綍貴東山遥夜薜蘿情風傳漏刻星河曙月上梧桐雨露清聖主好文誰為薦閉門空賦子虗成五言絶句洛中口號還鄉不見家年老眼多淚車馬上河橋城中好天氣山下泉漾漾帶山光澄澄倒林影那知石上喧却憶山中静七言絶句酬竇拾遺秋日見呈時此公自江隂令除諌官孤城永巷時相見衰柳閒門日半斜欲送近臣朝魏闕獨憐殘菊在陶家韋使君宅海榴詩淮陽卧理有清風臘月榴花帶雪紅閉閣寂寥常對此江湖心在數枝中㟧嶺四望漢家仙仗在咸陽洛水東流出建章野老至今猶望幸離宫晩樹獨蒼蒼二皇甫集巻八
