body:
  text: 跋慎早聞詩於李文正先生曰唐人號能詩者無慮千家其有傳者百餘集而止其集可以諷詠興觀難以章什拈摘者自李杜外雖髙岑王孟固有憾然矣又曰選唐者凡幾人雖精駁相出入然而良金美玉人共珍拾未有隱焉者也慎周於是言則取唐集之存者披之其的然可傳者昔人蓋嘗表之矣棄餘雖富平漫實繁山林遐逺篇籍罕具者不必以未見為恨也河中劉閏之苦勤聲律於唐尤數數者近輯二皇甫集將鍥布之吾觀二子生實伯仲故調亦雅似時以方張景陽孟陽焉然二張集吾不見其全矣跡若是者吾見二陸焉評者舍陸而稱張知擬倫矣鳴呼二陸之集自昭明選外無留良者况又甚亞乎吾於是安得不重有於文正之言也正德戊寅六月成都楊慎書
